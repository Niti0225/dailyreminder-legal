<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DailyReminder – Impressum</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 16px;line-height:1.6}
    .muted{color:#666}
    .warn{background:#fff3cd;border:1px solid #ffeeba;padding:12px;border-radius:12px}
  </style>
</head>
<body>
  <h1>Impressum</h1>
  <p class="muted">Përditësuar më: <span id="d"></span></p>

  <div class="warn">
    <strong>Shënim:</strong> Ky projekt është ende në zhvillim. Për momentin, për kërkesa përdor email-in e kontaktit.
    Pasi të përfundojë regjistrimi i biznesit, do të shtohen të dhënat e plota të impressum-it.
  </div>

  <h2>Kontakt</h2>
  <p>Email: <a href="mailto:Dailyreminder@hotmail.com">Dailyreminder@hotmail.com</a></p>

  <script>
    document.getElementById('d').textContent = new Date().toLocaleDateString('sq-AL');
  </script>
</body>
</html>
