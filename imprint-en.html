<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DailyReminder – Imprint</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 16px;line-height:1.6}
    .muted{color:#666}
    .warn{background:#fff3cd;border:1px solid #ffeeba;padding:12px;border-radius:12px}

<body>
  <h1>Imprint</h1>

  <div class="warn">
    <strong>Note:</strong> This project is currently under development. For inquiries, please use the contact email.
    Once business registration is completed, full imprint details will be added.
  </div>

  <h2>Contact</h2>
  <p>Email: <a href="mailto:Dailyreminder@hotmail.com">Dailyreminder@hotmail.com</a></p>

  <script>
    document.getElementById('d').textContent = new Date().toLocaleDateString('en-US');
  </script>
</body>
</html>
